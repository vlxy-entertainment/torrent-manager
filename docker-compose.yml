version: '3.8'

services:
  torbox-app:
    build:
      context: .
      dockerfile: Dockerfile
      # Rebuild when .env file changes
      args:
        - BUILDKIT_INLINE_CACHE=1
    container_name: torbox-app
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    env_file:
      - .env
    restart: unless-stopped
    # Watch for .env file changes (requires docker compose watch plugin)
    # Uncomment if using docker compose v2.22+ with watch feature
    # watch:
    #   - action: sync
    #     path: .env
    #     target: /app/.env
    #     ignore:
    #       - .git
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

